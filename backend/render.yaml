services:
  - type: web
    name: gcfb-backend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --no-cache-dir --only-binary=:all: -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://gcfb-ops-dashboard.vercel.app
      - key: PYTHONUNBUFFERED
        value: 1
