services:
  - type: web
    name: gcfb-backend
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://gcfb-ops-dashboard.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.9
