services:
  - type: web
    name: gcfb-backend
    runtime: python
    plan: free
    buildCommand: apt-get update && apt-get install -y build-essential python3-dev gfortran libopenblas-dev && pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://gcfb-ops-dashboard.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: 1
